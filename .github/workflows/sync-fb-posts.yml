name: Sync Facebook Posts

on:
  schedule:
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch public Facebook posts
        run: python3 sophiegarden/fetch_instagram.py

      - name: Commit if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add sophiegarden/fb-posts.json
          git diff --staged --quiet || (git commit -m "chore: sync Facebook posts [skip ci]" && git push)
