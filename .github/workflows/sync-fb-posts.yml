name: Sync Instagram Posts

on:
  schedule:
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Instagram posts
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          curl -sf "https://graph.instagram.com/v20.0/${IG_USER_ID}/media?fields=id,caption,media_type,media_url,thumbnail_url,permalink,timestamp&limit=4&access_token=${IG_ACCESS_TOKEN}" -o sophiegarden/fb-posts-new.json

          if python3 -c "import json,sys; d=json.load(open('sophiegarden/fb-posts-new.json')); assert 'data' in d; print('OK:', len(d['data']), 'post')"; then
            mv sophiegarden/fb-posts-new.json sophiegarden/fb-posts.json
            echo "Frissites sikeres"
          else
            rm -f sophiegarden/fb-posts-new.json
            echo "Ervenytelen valasz - regi adatok maradnak"
          fi

      - name: Refresh long-lived token
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          curl -sf "https://graph.instagram.com/refresh_access_token?grant_type=ig_refresh_token&access_token=${IG_ACCESS_TOKEN}" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Token frissitve, lejarat:', d.get('expires_in','?'), 'masodperc')" || echo "Token frissites sikertelen"

      - name: Commit if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add sophiegarden/fb-posts.json
          git diff --staged --quiet || (git commit -m "chore: sync Instagram posts [skip ci]" && git push)
