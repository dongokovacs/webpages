name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bube-viragbolt/package-lock.json

      - name: Install bube dependencies
        run: npm ci
        working-directory: bube-viragbolt

      - name: Build bube
        run: npm run build
        working-directory: bube-viragbolt

      - name: Assemble site
        run: |
          mkdir -p _site/bube-viragbolt
          cp index.html projects.json robots.txt sitemap.xml _site/
          cp -r galiba Galiba2 serpa_sorfozde _site/
          cp -r bube-viragbolt/dist/. _site/bube-viragbolt/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
