<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cinematic Center Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden}
    .back{position:fixed;top:24px;left:24px;z-index:200;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:8px 18px;color:rgba(255,255,255,.7);text-decoration:none;font-size:.8rem;backdrop-filter:blur(10px);transition:.2s}
    .back:hover{color:#fff;background:rgba(255,255,255,.15)}
    nav{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:12px 32px;display:flex;gap:28px;align-items:center}
    nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.85rem;font-weight:400;transition:.2s}
    nav a:hover{color:#fff}
    nav a.cta{background:#fff;color:#000;border-radius:50px;padding:8px 22px;font-weight:700;font-size:.85rem}
    nav a.cta:hover{background:#f0f0f0}
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;padding:120px 40px 80px}
    .hero-bg{position:absolute;inset:0;background:url('https://picsum.photos/seed/cinema-dark/1920/1080') center/cover;opacity:.25}
    .hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 0%,rgba(0,0,0,.8) 100%)}
    .hero-content{position:relative;z-index:1;max-width:900px}
    .badge{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:8px 20px;font-size:.78rem;font-weight:500;color:rgba(255,255,255,.6);letter-spacing:1px;margin-bottom:32px;backdrop-filter:blur(10px)}
    h1{font-size:clamp(3.5rem,9vw,7rem);font-weight:900;line-height:.95;letter-spacing:-4px;margin-bottom:24px}
    h1 em{font-style:italic;font-weight:300;color:rgba(255,255,255,.5)}
    .sub{font-size:1.1rem;color:rgba(255,255,255,.5);line-height:1.7;max-width:480px;margin:0 auto 48px;font-weight:300}
    .btn-row{display:flex;gap:16px;justify-content:center}
    .btn-white{background:#fff;color:#000;padding:16px 40px;border-radius:50px;font-size:1rem;font-weight:700;text-decoration:none;transition:.2s;letter-spacing:-.3px}
    .btn-white:hover{background:#f0f0f0;transform:translateY(-2px)}
    .btn-ghost{color:rgba(255,255,255,.6);padding:16px 32px;border-radius:50px;font-size:1rem;font-weight:400;text-decoration:none;border:1px solid rgba(255,255,255,.15);transition:.2s}
    .btn-ghost:hover{border-color:rgba(255,255,255,.4);color:#fff}
    .scroll-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.3}
    .scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,transparent,#fff)}
    .scroll-label{font-size:.7rem;letter-spacing:2px;text-transform:uppercase}
  </style>
</head>
<body>
  <a href="../index.html" class="back">← Vissza</a>
  <nav>
    <a href="#">Munkák</a><a href="#">Rólunk</a><a href="#">Blog</a>
    <a href="#" class="cta">Kapcsolat</a>
  </nav>
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="badge">gpt-taste · Cinematic Center Hero</div>
      <h1>Vizuális<br/><em>mesterség</em><br/>digitálisan.</h1>
      <p class="sub">Teljes szélességű háttér, centrált kompozíció, két kontrasztos CTA. Az AIDA struktúra Attention fázisa.</p>
      <div class="btn-row">
        <a href="#" class="btn-white">Munkáim →</a>
        <a href="#" class="btn-ghost">Megismersz</a>
      </div>
    </div>
    <div class="scroll-hint">
      <div class="scroll-line"></div>
      <div class="scroll-label">Scroll</div>
    </div>
  </section>
</body>
</html>
