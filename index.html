<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projektjeim</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900">

  <div class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-4xl font-bold mb-8">🚀 Projektjeim</h1>

    <div id="projects" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <script>
    fetch('./projects.json')
      .then(res => res.json())
      .then(projects => {
        const container = document.getElementById('projects');

        projects.forEach(p => {
          const card = document.createElement('div');
          card.className = "bg-white rounded-2xl shadow hover:shadow-lg transition overflow-hidden";

          card.innerHTML = `
            <img src="${p.image}" alt="${p.title}" class="w-full h-48 object-cover"/>

            <div class="p-5">
              <h2 class="text-xl font-semibold mb-2">${p.title}</h2>
              <p class="text-sm text-gray-600 mb-4">${p.description}</p>

              <a href="${p.link}" 
                 class="inline-block w-full text-center bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition">
                Megnyitás →
              </a>
            </div>
          `;

          container.appendChild(card);
        });
      })
      .catch(err => {
        document.getElementById('projects').innerHTML =
          "<p class='text-red-500'>Hiba a projektek betöltésekor 😢</p>";
        console.error(err);
      });
  </script>

</body>
</html>
